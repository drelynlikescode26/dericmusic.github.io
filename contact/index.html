<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Deric — Contact</title>
  <meta name="description" content="Contact Deric for fan or business inquiries.">
  <meta property="og:title" content="Deric — Contact">
  <meta property="og:description" content="Get in touch with Deric.">
  <meta property="og:image" content="/assets/hero/hero-poster.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="/assets/hero/hero-poster.jpg">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav solid" id="siteNav" aria-label="Site navigation">
    <a href="/" class="nav-logo">Deric</a>
    <div class="nav-links">
      <a href="/music/">Music</a>
      <a href="/videos/">Videos</a>
      <a href="/about/">About</a>
      <a href="/press/">Press</a>
      <a href="/contact/" aria-current="page">Contact</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="nav-mobile" id="navMobile" aria-hidden="true">
    <button class="nav-mobile-close" id="navMobileClose" aria-label="Close menu">✕</button>
    <a href="/music/">Music</a>
    <a href="/videos/">Videos</a>
    <a href="/about/">About</a>
    <a href="/press/">Press</a>
    <a href="/contact/" aria-current="page">Contact</a>
  </div>

  <div class="page-wrap">

    <!-- Page Hero -->
    <header class="page-hero">
      <div class="page-hero-inner">
        <div class="page-kicker">Deric</div>
        <h1 class="page-title">Contact</h1>
      </div>
    </header>

    <main class="page-main">

      <style>
        .form-status {
          display: none;
          padding: 1rem 1.25rem;
          border-radius: 12px;
          font-size: 0.85rem;
          font-weight: 500;
          margin-top: 0.5rem;
        }
        .form-status.success {
          display: block;
          background: rgba(29, 185, 84, 0.1);
          border: 1px solid rgba(29, 185, 84, 0.25);
          color: #1db954;
        }
        .form-status.error {
          display: block;
          background: rgba(255, 80, 80, 0.1);
          border: 1px solid rgba(255, 80, 80, 0.25);
          color: #ff6b6b;
        }
        .form-submit:disabled {
          opacity: 0.55;
          cursor: not-allowed;
          transform: none !important;
        }
      </style>

      <section class="p-section">
        <div class="contact-cols">

          <!-- Fan Message -->
          <div>
            <span class="contact-col-label">Fan Message</span>
            <form class="form" id="fanForm">
              <input type="hidden" name="_subject" value="Fan Message — dericmusic.com">
              <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

              <div class="form-row">
                <div class="form-field">
                  <label for="fan-name">Name</label>
                  <input type="text" id="fan-name" name="name" placeholder="Your name" autocomplete="name" required>
                </div>
                <div class="form-field">
                  <label for="fan-email">Email</label>
                  <input type="email" id="fan-email" name="email" placeholder="your@email.com" autocomplete="email" required>
                </div>
              </div>
              <div class="form-field">
                <label for="fan-message">Message</label>
                <textarea id="fan-message" name="message" rows="5" placeholder="Say something..." required></textarea>
              </div>
              <button type="submit" class="form-submit" id="fanSubmit">Send Message</button>
              <div class="form-status" id="fanStatus"></div>
            </form>
          </div>

          <!-- Business / Booking -->
          <div>
            <span class="contact-col-label">Business &amp; Booking</span>
            <form class="form" id="bizForm">
              <input type="hidden" name="_subject" value="Business Inquiry — dericmusic.com">
              <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

              <div class="form-row">
                <div class="form-field">
                  <label for="biz-name">Name</label>
                  <input type="text" id="biz-name" name="name" placeholder="Your name" autocomplete="name" required>
                </div>
                <div class="form-field">
                  <label for="biz-email">Email</label>
                  <input type="email" id="biz-email" name="email" placeholder="your@email.com" autocomplete="email" required>
                </div>
              </div>
              <div class="form-field">
                <label for="biz-type">Inquiry Type</label>
                <select id="biz-type" name="inquiry_type" required>
                  <option value="" disabled selected>Select inquiry type</option>
                  <option value="booking">Booking / Performance</option>
                  <option value="sync">Sync Licensing</option>
                  <option value="feature">Feature / Collaboration</option>
                  <option value="press">Press / Media</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="form-field">
                <label for="biz-message">Details</label>
                <textarea id="biz-message" name="message" rows="5" placeholder="Tell me about the project or opportunity..." required></textarea>
              </div>
              <button type="submit" class="form-submit" id="bizSubmit">Send Inquiry</button>
              <div class="form-status" id="bizStatus"></div>
            </form>

            <div class="contact-info" style="margin-top: 2.5rem;">
              <div class="contact-info-item">
                <div class="contact-info-label">Direct Email</div>
                <div class="contact-info-value">
                  <a href="mailto:contact@deric-music.com">contact@deric-music.com</a>
                </div>
              </div>
            </div>
          </div>

        </div>
      </section>

    </main>
  </div>

  <!-- Footer -->
  <footer class="page-footer">
    <div class="page-footer-inner">
      <nav class="page-footer-nav" aria-label="Footer navigation">
        <a href="/music/">Music</a>
        <a href="/videos/">Videos</a>
        <a href="/about/">About</a>
        <a href="/press/">Press</a>
        <a href="/contact/">Contact</a>
      </nav>
      <div class="page-footer-right">
        <div class="page-footer-social">
          <a href="https://instagram.com/envyderic" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
          <a href="https://tiktok.com/@envyderic" target="_blank" rel="noopener noreferrer" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
          <a href="https://youtube.com/@envyderic" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
          <a href="https://on.soundcloud.com/QkBEypZEjKWjtqOwt4" target="_blank" rel="noopener noreferrer" aria-label="SoundCloud"><i class="fab fa-soundcloud"></i></a>
          <a href="https://discord.gg/EMBhkprCtp" target="_blank" rel="noopener noreferrer" aria-label="Discord"><i class="fab fa-discord"></i></a>
        </div>
        <div class="page-footer-copy">© 2026 Deric. All rights reserved.</div>
      </div>
    </div>
  </footer>

  <script src="/js/nav.js"></script>
  <script>
    var FORMSPREE = 'https://formspree.io/f/xjgpwpyv';

    function setupForm(formId, btnId, statusId, btnLabel) {
      var form   = document.getElementById(formId);
      var btn    = document.getElementById(btnId);
      var status = document.getElementById(statusId);

      if (!form) return;

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        btn.disabled = true;
        btn.textContent = 'Sending…';
        status.className = 'form-status';
        status.textContent = '';

        fetch(FORMSPREE, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        })
        .then(function (res) {
          if (res.ok) {
            status.className = 'form-status success';
            status.textContent = 'Sent! I\'ll get back to you soon.';
            form.reset();
          } else {
            throw new Error();
          }
        })
        .catch(function () {
          status.className = 'form-status error';
          status.textContent = 'Something went wrong. Email contact@deric-music.com directly.';
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = btnLabel;
        });
      });
    }

    setupForm('fanForm', 'fanSubmit', 'fanStatus', 'Send Message');
    setupForm('bizForm', 'bizSubmit', 'bizStatus', 'Send Inquiry');
  </script>

</body>
</html>
